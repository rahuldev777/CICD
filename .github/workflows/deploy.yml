name: Build and Push FRONT-END Docker Image

on:
  push:
    branches: ["main"]

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # STEP 1: Scan source code FIRST
      - name: Run Trivy Vulnerability Scanner (FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # STEP 2: Build the new image FIRST
      - name: Build and Push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          no-cache: true
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/to-do-app:front-end-v4.2 # ← fixed tag

      # STEP 3: THEN scan the newly pushed image
      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ secrets.DOCKER_USERNAME }}/to-do-app:front-end-v4.2 # ← must match above
          only-severities: critical,high
          exit-code: true
